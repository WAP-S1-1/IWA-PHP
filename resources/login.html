<!DOCTYPE html>
<html lang="en">
<head>

</head>
<style>
    body {
        background-image: url('background-sky.jpg');
    }
</style>
<body class="d-flex justifiy-content-center align-items-center vh-100">

    <button type="submit" class="btn btn-dark w-100" style="background-color: black; color: white;border-color: black">
        Login
    </button>

</div>
