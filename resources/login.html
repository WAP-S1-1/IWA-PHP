<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body {
        background-image: url('background-sky.jpg');
    }
</style>
<body class="d-flex justifiy-content-center align-items-center vh-100">
<div class="card shadow-lg p-4 mx-auto mt-5 align-items-center rounded-5" style="width:550px;height:440px; background-color:rgba(255,255,255,0.5)">
    <img src="LogoIWA.png">
        <form style="width:280px">
            <div class="mb-3" style="font-weight:500">
                <label for="exampleInputEmployeeNumber" class="form-label">Personeelsnummer</label>
                <input type="email" class="form-control" style="background-color:rgba(255,255,255,0.4)" id="exampleInputEmployeeNumber">
            </div>

            <div class="mb-3"style="font-weight:500">
                <label for="exampleInputPassword1" class="form-label">Wachtwoord</label>
                <input type="password" class="form-control" style="background-color:rgba(255,255,255,0.4)" id="exampleInputPassword1">
            </div>
                <p style="text-decoration: underline">
                    Wachtwoord vergeten?
                </p>
            <button type="submit" class="btn btn-dark w-100 p-1" >
                Login
            </button>
        </form>
</div>
</body>
</html>
