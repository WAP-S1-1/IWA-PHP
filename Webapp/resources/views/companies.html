<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Companies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url('/background-sky.jpg');
        }
        .stations-card{
            width: 18rem;
            margin: 1rem;
            border-radius: 0.5rem;
        }
        #bedrijf-scroll {
            max-height: 100%;
            overflow-y: auto;
        }
        h2{text-align:center; color:#294B71;padding-top: 21px}
        h1{text-align:center; color:white;padding-top: 21px}
        p{font-weight: bold;}
    </style>
</head>
<body>
<div class="card shadow-lg p-4 mx-auto mt-5 rounded-5"
     style="width:1600px;height:800px; background-color:rgba(255,255,255,0.5)">
    <div class="row p-3">
        <div class="col-sm-2 m-5" style="border-bottom: solid black 2px">
            <p>Naam</p>
        </div>
        <div class="col-sm-3 m-5" style="border-bottom: solid black 2px">
            <p>E-mail</p>
        </div>
        <div class="col m-5" style="border-bottom: solid black 2px">
            <p>Adresgegevens</p>
        </div>
    </div>
    <div class="w-100">
        <div class="row p-5 g-4 justify-content-center" id="bedrijf-container">
            <div>

            </div>
        </div>
    </div>
</div>

<script>
    fetch("/api/bedrijven")
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById("bedrijf-container");
            if (!container) {
                console.error("No element with id 'bedrijf-container' found");
                return;
            }

            if (!data.stations || !Array.isArray(data.stations)) {
                console.error("Expected data.bedrijf to be an array", data);
                return;
            }

            data.stations.forEach(station => {
                const col = document.createElement("div");
                col.classList.add("row-auto");
                const card = document.createElement("div");
                card.classList.add("card", "stations-card");

                card.innerHTML = `
        <div class="card-body p-3">
            <h2 class="name">Station ${station.name}</h2>
            <hr>
            <p>
                <img src="/location.svg" class="me-2" style="width:40px; vertical-align:middle;">
                ${station.geolocations?.[0]?.country ?? 'Country'}, ${station.geolocations?.[0]?.city ?? 'City'}
            </p>
            <p>Longitude ${station.longitude ?? ''}</p>
            <p>Latitude ${station.latitude ?? ''}</p>
            <p>Elevation ${station.elevation ?? ''} m</p>
        </div>
    `;

                col.appendChild(card);
                container.appendChild(col);
            });

        })
        .catch(error => {
            console.error("Error loading stations.json:", error);
        });
</script>
</body>
</html>
</title>
</head>
<body>

</body>
</html>
