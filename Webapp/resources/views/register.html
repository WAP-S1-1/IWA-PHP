<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Add New User</h2>
    <form action="/api/register" method="POST">
        <!-- CSRF token for Laravel -->
        <input type="hidden" name="_token" value="{{ csrf_token() }}">

        <div class="mb-3">
            <label for="name" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>

        <div class="mb-3">
            <label for="first_name" class="form-label">First Name (optional)</label>
            <input type="text" class="form-control" id="first_name" name="first_name" placeholder="First Name">
        </div>

        <div class="mb-3">
            <label for="initials" class="form-label">Initials (optional)</label>
            <input type="text" class="form-control" id="initials" name="initials" placeholder="Initials">
        </div>

        <div class="mb-3">
            <label for="prefix" class="form-label">Prefix (optional)</label>
            <input type="text" class="form-control" id="prefix" name="prefix" placeholder="Prefix">
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>

        <div class="mb-3">
            <label for="employee_code" class="form-label">Employee Code</label>
            <input type="text" class="form-control" id="employee_code" name="employee_code">
        </div>

        <div class="mb-3">
            <label for="user_role" class="form-label">Role</label>
            <select class="form-select" id="user_role" name="user_role" required>
                <option value="">Select Role</option>
                <option value="1">Technisch medewerker - Medewerker van de afdeling monitoring en beheer</option>
                <option value="2">Technisch onderzoeker - Medewerker van de afdeling analyse en datamining</option>
                <option value="3">Commercieel medewerker - Medewerker van de afdeling marketing en klant beheer</option>
                <option value="4">Administratief medewerker - Medewerker van de afdeling personeelszaken</option>
                <option value="5">Technisch beheerder - Medewerker van de afdeling IT-support</option>
                <option value="6">Administrator - Super user</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>

        <div class="mb-3">
            <label for="password_confirmation" class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="password_confirmation" name="password_confirmation" required>
        </div>

        <button type="submit" class="btn btn-primary">Add User</button>
    </form>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
